<div class="home-container">
  <h1>{{ portalName }}</h1>
  <p>Your one-stop destination to browse and enroll in courses, view your profile, and manage your learning.</p>
  
  <div class="stats-row">
    <div class="stat">Courses Available: {{ coursesCount }}</div>
    <div class="stat">Enrolled: 3</div>
    <div class="stat">GPA: 3.8</div>
  </div>

  <app-course-summary-widget></app-course-summary-widget>

  <div class="actions">
    <!-- Event and Property Binding -->
    <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
    <p *ngIf="message">{{ message }}</p>

    <!-- Two-Way Binding -->
    <div>
      <input [(ngModel)]="searchTerm" placeholder="Search courses...">
      <!-- [property] vs [(ngModel)]: [property] is one-way binding (component to DOM), [(ngModel)] is two-way binding (DOM to/from component) -->
      <p>Searching for: {{ searchTerm }}</p>
    </div>
  </div>
</div>
